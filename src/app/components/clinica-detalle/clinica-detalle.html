<div class="detalle-screen">

  @if (clinica()) {

    <div class="hero-header">
      <div class="hero-text">
        <button class="btn-back" (click)="goBack()">← Volver</button>
        <h1>{{ clinica()!.nombre }}</h1>
        <p>{{ clinica()!.descripcion }}</p>
      </div>
      <div class="hero-img">
        <img src="assets/doctora.png" alt="Doctora" />
      </div>
    </div>

    <div class="clinica-card">
      <div class="clinica-info">
        <h2>{{ clinica()!.nombre }}</h2>
        <p>{{ clinica()!.descripcion }}</p>
      </div>
      <div class="clinica-foto">
        <img [src]="clinica()!.imagen" [alt]="clinica()!.nombre" />
      </div>
    </div>

    <div class="tratamientos-section">
      <div class="tratamientos-grid">
        @for (t of clinica()!.tratamientos; track t.id) {
          <div class="trat-card" (click)="verEspecialistas(t.id, t.nombre)">
            <div class="trat-foto">
              <img [src]="t.imagen" [alt]="t.nombre" />
            </div>
            <span>{{ t.nombre }}</span>
          </div>
        }
      </div>
    </div>

  }

  <app-bottom-nav />
</div>
