<div class="odon-screen">

  <!-- Hero header -->
  <div class="hero-header">
    <div class="hero-text">
      <button class="btn-back" (click)="goBack()">← Volver</button>
      <h1>Hi {{ 'Alex' }}</h1>
      <p>La odontología es la rama de la medicina que se encarga del diagnóstico, prevención y tratamiento de las enfermedades de los dientes, encías y boca.</p>
    </div>
    <div class="hero-img">
      <img src="assets/doctora.png" alt="Doctora" />
    </div>
  </div>

  <!-- Lista de clínicas -->
  <div class="clinicas-list">
    @for (clinica of lista; track clinica.id) {
      <div class="clinica-card" (click)="verClinica(clinica.id)">
        <div class="clinica-info">
          <h2>{{ clinica.nombre }}</h2>
          <p>{{ clinica.descripcion }}</p>
        </div>
        <div class="clinica-foto">
          <img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=300&q=80" alt="Doctora" />
        </div>
      </div>
    }
  </div>

  <app-bottom-nav />
</div>
