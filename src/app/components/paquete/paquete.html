<div class="paq-screen">

  <div class="paq-header">
    <h1>{{ tratNombre }}</h1>
    <p>Personaliza tu paquete de viaje</p>
  </div>

  <div class="paq-list">

    <!-- HOSPEDAJE -->
    <div class="paq-card">
      <div class="paq-info">
        <h3>HOSPEDAJE</h3>
        <div class="check-row">
          <span class="checkbox checked">✓</span>
          @if (paqState.hospedaje()) {
            <span class="sel-text">
              {{ paqState.hospedaje()!.habitacionNombre }}:
              {{ paqState.hospedaje()!.hotelNombre }}
              ({{ paqState.hospedaje()!.checkin }} – {{ paqState.hospedaje()!.checkout }})
            </span>
          } @else {
            <div class="dashed-line"></div>
          }
        </div>
        <button class="btn-ver" (click)="irHoteles()">VER HOTELES</button>
      </div>
      <div class="paq-img">
        <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=200&q=80" alt="Hospedaje" />
      </div>
    </div>

    <!-- TRANSPORTE -->
    <div class="paq-card">
      <div class="paq-info">
        <h3>TRANSPORTE</h3>
        <div class="check-row">
          <span class="checkbox checked">✓</span>
          <div class="dashed-line"></div>
        </div>
        <button class="btn-ver" (click)="irTransporte()">VER OPCIONES</button>
      </div>
      <div class="paq-img">
        <img src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=200&q=80" alt="Transporte" />
      </div>
    </div>

    <!-- INTÉRPRETE -->
    <div class="paq-card">
      <div class="paq-info">
        <h3>INTÉRPRETE</h3>
        <div class="check-row">
          <span class="checkbox checked">✓</span>
          <div class="dashed-line"></div>
        </div>
        <button class="btn-ver" (click)="irInterprete()">VER INTÉRPRETES</button>
      </div>
      <div class="paq-img">
        <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?w=200&q=80" alt="Intérprete" />
      </div>
    </div>

  </div>

  <div class="paq-footer">
    <button class="btn-finalizar" (click)="finalizar()">FINALIZAR</button>
  </div>

  <app-bottom-nav />
</div>
