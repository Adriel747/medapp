<div class="trn-screen">

  <div class="trn-hero">
    <div class="trn-hero-text">
      <h1>Hi {{ user()?.name }}</h1>
      <p>ESCOGE LA MEJOR RUTA DE VIAJES DE TODA BOLIVIA</p>
    </div>
    <div class="trn-hero-img">
      <img src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=200&q=80" alt="Transporte" />
    </div>
  </div>

  <div class="trn-list">
    @for (t of lista; track t.id) {
      <div class="trn-card">
        <div class="trn-info">
          <h3>{{ t.nombre }}</h3>
          <p>{{ t.descripcion }}</p>
          <button class="btn-ver" (click)="verTransporte(t.id)">VER OPCIONES</button>
        </div>
        <div class="trn-foto">
          <img [src]="t.imagen" [alt]="t.nombre" />
        </div>
      </div>
    }
  </div>

  <app-bottom-nav />
</div>
